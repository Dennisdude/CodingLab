<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="image-sidebar">
        <div class="logo">
            <img src="./assets/odin-lined.png" alt="Odin Logo">
            <div>ODIN</div>
        </div>
    </div>

    <div class="content">
        <div class="text">
            <p>This is not a real online service!</p>
            <p>
                You know you need something like this in your life to help you 
                realize your deepest dreams. Sign up <span>now</span> to get started!
            </p>
            <p>You <span>know</span> you want to!</p>
        </div>

        <form action="#">
            <fieldset>
                <h2>Let's do this!</h2>

                <div class="input-container">
                    <div>
                        <label for="first_name">First Name</label>
                        <input type="text" name="first_name" id="first_name" required>
                    </div>
    
                    <div>
                        <label for="last_name">Last Name</label>
                        <input type="text" name="last_name" id="last_name" required>
                    </div>
    
                    <div>
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" required>
                    </div>
                        
                    <div>
                        <label for="phone_number">Phone Number</label>
                        <input type="tel" name="phone_number" id="phone_number" placeholder="(123) 456-7890">
                    </div>
                        
                    <div>
                        <label for="password">Password</label>
                        <input type="password" name="password" id="password" required>
                    </div>
                        
                    <div>
                        <label for="c_password">Confirm Password</label>
                        <input type="password" name="c_password" id="c_password" required>
                    </div>
                </div>
            </fieldset>

            <button type="submit">Create Account</button>

            <div class="link">
                Already have an account?
                <a href="#">Log in</a>
            </div>
        </form>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
